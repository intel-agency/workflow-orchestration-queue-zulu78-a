# OS-APOW Docker Compose
# Local development and testing orchestration

services:
  notifier:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - os-apow

  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "src.orchestrator_sentinel"]
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=${GITHUB_REPO}
      - SENTINEL_BOT_LOGIN=${SENTINEL_BOT_LOGIN:-}
    depends_on:
      notifier:
        condition: service_healthy
    networks:
      - os-apow

networks:
  os-apow:
    driver: bridge
